<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>FORGE — Painel do Gestor</title>
  <link rel="icon" type="image/png" href="https://i.imgur.com/M9aamh7.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f7f5;
      --bg2: #ffffff;
      --surface: #ffffff;
      --surface2: #f0f0ed;
      --surface3: #e8e8e4;
      --border: #e4e4e0;
      --border2: #d0d0cb;
      --accent: #f5c800;
      --accent2: #e0b400;
      --accent-dim: rgba(245,200,0,.10);
      --accent-soft: rgba(245,200,0,.25);
      --red: #e03e3e; --red-dim: rgba(224,62,62,.08);
      --green: #2e7d52; --green-dim: rgba(46,125,82,.08); --green-soft: rgba(46,125,82,.15);
      --text: #111110;
      --text2: #555550;
      --text3: #999990;
      --head: 'Nunito', sans-serif;
      --body: 'Plus Jakarta Sans', sans-serif;
      --r: 12px; --r2: 16px;
      --shadow: 0 2px 12px rgba(0,0,0,.07), 0 1px 3px rgba(0,0,0,.05);
      --shadow-md: 0 8px 32px rgba(0,0,0,.12), 0 2px 8px rgba(0,0,0,.07);
    }
    html { scroll-behavior: smooth; }
    /* Prevent zoom */
    html { touch-action: pan-x pan-y; }
    * { touch-action: manipulation; }

    body { font-family: var(--body); background: var(--bg); color: var(--text); min-height: 100vh; }
    button { cursor: pointer; border: none; font-family: inherit; }
    input, select, textarea { font-family: inherit; }
    .hidden { display: none !important; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 5px; }

    #toast-container { position: fixed; bottom: 28px; right: 28px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: var(--surface); color: var(--text); padding: 13px 18px; border-radius: var(--r); font-size: .82rem; font-weight: 600; border: 1px solid var(--border); min-width: 240px; position: relative; animation: toastIn .25s cubic-bezier(.22,1,.36,1); box-shadow: var(--shadow-md); }
    .toast.success::before { content: ''; position: absolute; left: 0; top: 0; width: 3px; height: 100%; background: var(--green); border-radius: 3px 0 0 3px; }
    .toast.error::before { content: ''; position: absolute; left: 0; top: 0; width: 3px; height: 100%; background: var(--red); border-radius: 3px 0 0 3px; }
    @keyframes toastIn { from { transform: translateX(24px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .modal-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,.35); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; padding: 16px; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; width: 100%; max-width: 760px; max-height: 92vh; overflow-y: auto; box-shadow: var(--shadow-md); }
    .modal-sm { max-width: 460px; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); z-index: 1; border-radius: 20px 20px 0 0; }
    .modal-header h3 { font-family: var(--head); font-size: 1.05rem; font-weight: 800; color: var(--text); }
    .modal-body { padding: 24px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
    .close-btn { background: var(--surface2); border: 1px solid var(--border); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: .95rem; transition: all .15s; }
    .close-btn:hover { background: var(--surface3); color: var(--text); }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: .75rem; font-weight: 700; color: var(--text2); margin-bottom: 7px; text-transform: uppercase; letter-spacing: .06em; }
    .form-control { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: var(--r); font-size: .88rem; transition: all .15s; background: var(--bg); color: var(--text); }
    .form-control:focus { outline: none; border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 3px rgba(245,200,0,.15); }
    .form-control option { background: var(--surface); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media(max-width:520px){ .form-row { grid-template-columns: 1fr; } }

    .btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px; border-radius: var(--r); font-size: .85rem; font-weight: 700; transition: all .15s; cursor: pointer; border: none; font-family: var(--body); }
    .btn-primary { background: var(--accent); color: #111110; box-shadow: 0 4px 14px rgba(245,200,0,.3); }
    .btn-primary:hover { transform: translateY(-1px); background: #ffd700; box-shadow: 0 6px 20px rgba(245,200,0,.4); }
    .btn-ghost { background: var(--surface2); color: var(--text2); border: 1.5px solid var(--border); }
    .btn-ghost:hover { border-color: var(--border2); color: var(--text); background: var(--surface3); }
    .btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid rgba(224,62,62,.25); }
    .btn-danger:hover { background: rgba(224,62,62,.15); }
    .btn-whatsapp { background: rgba(37,211,102,.08); color: #128c4a; border: 1px solid rgba(37,211,102,.25); }
    .btn-whatsapp:hover { background: rgba(37,211,102,.15); }
    .btn-sm { padding: 6px 13px; font-size: .78rem; }
    .btn-loading { opacity: .5; pointer-events: none; }

    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 99px; font-size: .72rem; font-weight: 700; }
    .badge-active { background: var(--green-dim); color: var(--green); border: 1px solid rgba(46,125,82,.2); }
    .badge-expired { background: var(--red-dim); color: var(--red); border: 1px solid rgba(224,62,62,.2); }

    #screen-login { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; background: linear-gradient(135deg, #f7f7f5 0%, #fffef0 50%, #f7f7f5 100%); }
    .login-card { width: 100%; max-width: 340px; background: #ffffff; border: 1px solid #e4e4e0; border-radius: 24px; padding: 36px 32px; box-shadow: 0 8px 40px rgba(0,0,0,.1); }

    #screen-dashboard { display: none; flex-direction: column; min-height: 100vh; }
    .topbar { background: #111110; border-bottom: 1px solid #2e2e2a; padding: 0 24px; height: 62px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 16px rgba(0,0,0,.3); }
    .topbar-brand { font-family: var(--head); font-size: 1.2rem; font-weight: 800; color: #ffffff; letter-spacing: -.01em; display: flex; align-items: center; gap: 10px; }
    .topbar-brand .dot { width: 8px; height: 8px; border-radius: 50%; background: #ffffff; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .user-pill { background: rgba(245,200,0,.12); border: 1px solid rgba(245,200,0,.3); border-radius: 8px; padding: 5px 14px; font-size: .78rem; font-weight: 700; color: var(--accent); }
    .logout-btn { background: none; color: #555550; font-size: .78rem; padding: 6px 12px; border-radius: 8px; font-weight: 600; transition: all .15s; }
    .logout-btn:hover { color: var(--red); background: var(--red-dim); }

    .app-layout { display: flex; flex: 1; height: calc(100vh - 62px); }
    .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); padding: 20px 10px; display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; overflow-y: auto; }
    .sidebar-section { font-size: .68rem; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .12em; padding: 14px 12px 8px; }
    .sidebar-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: var(--r); font-size: .88rem; font-weight: 600; color: var(--text2); cursor: pointer; transition: all .15s; position: relative; }
    .sidebar-item:hover { background: var(--surface2); color: var(--text); }
    .sidebar-item.active { background: var(--accent-dim); color: #111110; font-weight: 700; }
    .sidebar-item.active::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 3px; height: 60%; background: var(--accent); border-radius: 0 3px 3px 0; }

    .main-content { flex: 1; overflow-y: auto; padding: 28px; background: var(--bg); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
    .page-title { font-family: var(--head); font-size: 1.5rem; font-weight: 800; color: var(--text); letter-spacing: -.02em; }
    .search-wrap { position: relative; }
    .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: .4; pointer-events: none; }
    .search-input { padding: 9px 14px 9px 38px; border: 1.5px solid var(--border); border-radius: var(--r); font-size: .84rem; width: 230px; background: var(--surface); color: var(--text); font-weight: 500; transition: border-color .15s; }
    .search-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(245,200,0,.12); }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r2); padding: 22px; box-shadow: var(--shadow); position: relative; overflow: hidden; transition: box-shadow .2s; }
    .stat-card:hover { box-shadow: var(--shadow-md); }
    .stat-card::after { content: ''; position: absolute; top: -20px; right: -20px; width: 80px; height: 80px; border-radius: 50%; background: var(--accent-dim); }
    .stat-num { font-family: var(--head); font-size: 2.6rem; font-weight: 800; color: var(--text); line-height: 1; }
    .stat-num.green { color: var(--green); }
    .stat-num.red { color: var(--red); }
    .stat-lbl { font-size: .76rem; color: var(--text3); margin-top: 6px; font-weight: 600; }
    .quick-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r2); padding: 24px; box-shadow: var(--shadow); }
    .quick-card h3 { font-family: var(--head); font-size: 1rem; font-weight: 700; margin-bottom: 16px; color: var(--text2); }

    .students-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 16px; }
    .student-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r2); padding: 20px; cursor: pointer; transition: all .2s; box-shadow: var(--shadow); }
    .student-card:hover { border-color: var(--accent-soft); transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .student-card-top { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
    .avatar { width: 46px; height: 46px; border-radius: 12px; flex-shrink: 0; background: var(--accent-dim); border: 1px solid var(--accent-soft); display: flex; align-items: center; justify-content: center; font-family: var(--head); font-weight: 800; font-size: 1rem; color: #111110; }
    .student-name { font-weight: 700; font-size: .96rem; color: var(--text); }
    .student-code { font-size: .74rem; color: var(--text3); margin-top: 2px; font-weight: 600; letter-spacing: .07em; }

    .back-btn { display: inline-flex; align-items: center; gap: 6px; color: var(--text2); font-size: .84rem; cursor: pointer; background: none; border: none; margin-bottom: 22px; font-weight: 600; transition: color .15s; padding: 0; }
    .back-btn:hover { color: #111110; }
    .detail-header { display: flex; align-items: flex-start; gap: 18px; margin-bottom: 28px; flex-wrap: wrap; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
    .detail-avatar { width: 64px; height: 64px; border-radius: 16px; flex-shrink: 0; background: var(--accent-dim); border: 1px solid var(--accent-soft); display: flex; align-items: center; justify-content: center; font-family: var(--head); font-weight: 800; font-size: 1.5rem; color: #111110; }
    .detail-info h2 { font-family: var(--head); font-size: 1.4rem; font-weight: 800; color: var(--text); }
    .detail-info .code { font-size: .76rem; color: var(--text3); margin-top: 4px; font-weight: 600; letter-spacing: .08em; }
    .section-label { font-size: .72rem; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .12em; margin-bottom: 14px; margin-top: 4px; display: flex; align-items: center; gap: 10px; }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .plans-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
    .plan-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r2); overflow: hidden; transition: all .2s; box-shadow: var(--shadow); }
    .plan-card:hover { border-color: var(--border2); box-shadow: var(--shadow-md); }
    .plan-card.expired { opacity: .6; }
    .plan-card-header { display: flex; align-items: center; gap: 14px; padding: 16px 18px; }
    .plan-letter { width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0; background: var(--accent-dim); border: 1px solid var(--accent-soft); display: flex; align-items: center; justify-content: center; font-family: var(--head); font-weight: 800; font-size: 1rem; color: #111110; }
    .plan-info { flex: 1; min-width: 0; }
    .plan-title { font-weight: 700; font-size: .96rem; color: var(--text); }
    .plan-meta { font-size: .74rem; color: var(--text3); margin-top: 3px; font-weight: 500; }
    .plan-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; flex-wrap: wrap; }
    .plan-workouts { border-top: 1px solid var(--border); padding: 12px 18px; display: flex; flex-direction: column; gap: 8px; background: var(--bg); }
    .workout-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 12px 14px; }
    .workout-row-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .workout-row-tag { background: var(--accent-dim); color: #111110; border: 1px solid var(--accent-soft); border-radius: 6px; padding: 2px 9px; font-size: .72rem; font-weight: 700; flex-shrink: 0; }
    .workout-row-title { font-weight: 700; font-size: .88rem; flex: 1; }
    .workout-days { display: flex; gap: 4px; flex-wrap: wrap; }
    .day-chip { background: var(--surface2); color: var(--text2); border: 1px solid var(--border2); border-radius: 6px; padding: 3px 8px; font-size: .72rem; font-weight: 600; }
    .workout-excount { font-size: .74rem; color: var(--text3); margin-top: 6px; font-weight: 500; }
    .add-plan-btn { border: 2px dashed var(--border2); background: transparent; color: var(--text3); border-radius: var(--r2); padding: 20px; width: 100%; font-size: .88rem; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: all .2s; font-family: var(--body); }
    .add-plan-btn:hover { border-color: var(--accent); color: #111110; background: var(--accent-dim); }
    .empty-center { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; gap: 16px; }
    .empty-icon { width: 68px; height: 68px; border-radius: 18px; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 1.7rem; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); grid-column: 1/-1; }
    .empty-state .ei { font-size: 2.5rem; margin-bottom: 10px; }

    .workouts-editor { display: flex; flex-direction: column; gap: 12px; margin-top: 4px; }
    .workout-block { background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--r2); overflow: hidden; }
    .workout-block-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--surface); }
    .wb-letter { width: 28px; height: 28px; border-radius: 7px; background: var(--accent-dim); border: 1px solid var(--accent-soft); display: flex; align-items: center; justify-content: center; font-family: var(--head); font-weight: 800; font-size: .85rem; color: #111110; flex-shrink: 0; }
    .wb-title-input { flex: 1; padding: 7px 11px; border: 1.5px solid var(--border); border-radius: 8px; font-size: .88rem; background: var(--bg); color: var(--text); font-weight: 700; }
    .wb-title-input:focus { outline: none; border-color: var(--accent); }
    .remove-block-btn { background: var(--red-dim); color: var(--red); border: 1px solid rgba(224,62,62,.2); border-radius: 7px; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: .85rem; flex-shrink: 0; }
    .workout-block-body { padding: 14px 16px; }
    .days-selector { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .day-toggle { padding: 7px 13px; border-radius: var(--r); border: 1.5px solid var(--border); background: var(--surface); font-size: .78rem; font-weight: 700; cursor: pointer; transition: all .15s; color: var(--text2); }
    .day-toggle.selected { background: var(--accent); border-color: var(--accent2); color: #111110; box-shadow: 0 2px 8px rgba(245,200,0,.35); }
    .exercises-list { display: flex; flex-direction: column; gap: 8px; }
    .exercise-item { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--r); padding: 14px; transition: box-shadow .15s, opacity .15s; position: relative; }
    .exercise-item.drag-over { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
    .exercise-item.dragging { opacity: .4; }
    .exercise-item-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .drag-handle { cursor: grab; color: var(--text3); padding: 2px 4px; border-radius: 4px; display: flex; align-items: center; flex-shrink: 0; transition: color .15s; user-select: none; }
    .drag-handle:hover { color: var(--text2); background: var(--surface2); }
    .drag-handle:active { cursor: grabbing; }
    .ex-num { width: 24px; height: 24px; border-radius: 6px; flex-shrink: 0; background: var(--surface2); color: var(--text3); display: flex; align-items: center; justify-content: center; font-size: .72rem; font-weight: 700; border: 1px solid var(--border); }
    .exercise-controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .ctrl-label { font-size: .7rem; font-weight: 700; color: var(--text3); display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .07em; }
    .remove-ex-btn { margin-left: auto; background: var(--red-dim); color: var(--red); border: 1px solid rgba(224,62,62,.2); border-radius: 6px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: .8rem; flex-shrink: 0; }
    .add-ex-btn { width: 100%; padding: 9px; border: 2px dashed var(--border2); background: transparent; color: var(--text3); border-radius: var(--r); font-weight: 700; font-size: .82rem; cursor: pointer; margin-top: 8px; transition: all .15s; }
    .add-ex-btn:hover { border-color: var(--accent); color: #111110; background: var(--accent-dim); }
    .add-workout-block-btn { border: 2px dashed var(--border2); background: transparent; color: var(--text2); border-radius: var(--r); padding: 14px; width: 100%; font-size: .86rem; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: all .15s; font-family: var(--body); }
    .add-workout-block-btn:hover { border-color: var(--accent); color: #111110; background: var(--accent-dim); }
    .checkbox-label { display: flex; align-items: center; gap: 7px; font-size: .82rem; color: var(--text2); cursor: pointer; user-select: none; margin-top: 8px; font-weight: 600; }
    .checkbox-label input[type=checkbox] { accent-color: var(--accent); width: 15px; height: 15px; }

    .pv-workout { background: var(--bg); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; margin-bottom: 12px; }
    .pv-workout-title { font-weight: 700; margin-bottom: 10px; font-size: .95rem; display: flex; align-items: center; gap: 8px; color: var(--text); }
    .pv-days { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }
    .pv-ex { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 6px; }
    .pv-ex-name { font-weight: 700; font-size: .9rem; margin-bottom: 5px; color: var(--text); }
    .pv-ex-meta { font-size: .77rem; color: var(--text2); line-height: 1.7; font-weight: 500; }
    .yt-embed { border-radius: var(--r); overflow: hidden; margin-top: 8px; }
    .yt-embed iframe { width: 100%; aspect-ratio: 16/9; display: block; border: none; }
    .yt-fallback { display: none; margin-top: 8px; }
    .yt-fallback-btn { display: flex; align-items: center; gap: 10px; padding: 11px 14px; background: #ff0000; color: white; border-radius: var(--r); text-decoration: none; font-weight: 700; font-size: .82rem; }

    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: 60px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 8px 0 env(safe-area-inset-bottom); z-index: 100; box-shadow: 0 -2px 16px rgba(0,0,0,.06); }
    .mobile-nav-items { display: flex; justify-content: space-around; }
    .mobile-nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: .68rem; font-weight: 700; color: var(--text3); cursor: pointer; padding: 6px 20px; border-radius: 8px; transition: color .15s; }
    .mobile-nav-item.active { color: #111110; }
    .mobile-nav-item .ni { font-size: 1.2rem; }

  const expiryStr=p.expiry?new Date(p.expiry+'T12:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'}):'Sem data de validade';

  let exercisesHTML='';
  (p.workouts||[]).forEach((w,wi)=>{

      const uniqueReps=[...new Set(repsArr)];
      const repsDisplay=uniqueReps.length===1?uniqueReps[0]:repsArr.join(' / ');
      const tags=[];

      exRows+=`<tr>
        <td class="ex-num">${ei+1}</td>
        <td class="ex-name-cell">
          <strong>${ex.name}</strong>
          ${tags.length?'<div class="ex-tags">'+tags.map(t=>'<span class="tag">'+t+'</span>').join('')+'</div>':''}
          ${ex.obs?'<div class="ex-obs">'+ex.obs+'</div>':''}
        </td>
        <td class="ex-stat">${ex.series}</td>
        <td class="ex-stat">${repsDisplay}</td>
      </tr>`;
    });
    exercisesHTML+=`
      <div class="workout-block">
        <div class="workout-header">
          <div class="workout-badge">${String.fromCharCode(65+wi)}</div>
          <div class="workout-info">
            <div class="workout-title">${w.title||'Treino '+(wi+1)}</div>

          </div>
          <div class="workout-count">${(w.exercises||[]).length} exercício${(w.exercises||[]).length!==1?'s':''}</div>

            <th class="th-name">Exercício</th>
            <th class="th-stat">Séries</th>

        </table>
      </div>`;
  });

  const html=`<!DOCTYPE html>
<html lang="pt-BR">

<title>Ficha de Treino — ${studentName}</title>

  /* STATUS BADGE */
  .status-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;margin-bottom:20px;font-size:12px;font-weight:700;${expired?'background:#fef2f2;border:1px solid #fecaca;color:#e03e3e;':'background:#f0faf5;border:1px solid #bbf0d5;color:#2e7d52;'}}
  .status-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;}

  /* FOOTER */

  .footer-left{font-size:10px;color:#cccccc;font-weight:600;}
  .footer-right{font-size:10px;color:#cccccc;}

  /* PRINT */
  @media print{
    body{font-size:12px;}
    .page{padding:20px;}

    @page{margin:16mm 12mm;}
  }
  @media(max-width:600px){
    .page{padding:20px 16px;}
    .header{flex-direction:column;gap:12px;}
    .header-right{text-align:left;}
    .th-stat,.ex-stat{width:52px;font-size:12px;}
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="header-left">
      <div class="brand">Sistema de Treinamento</div>
      <div class="student">${studentName}</div>
      <div class="plan-name">${p.title}</div>
    </div>
    <div class="header-right">
      <div class="validity-label">Validade</div>
      <div class="validity">${expiryStr}${expired?' · Vencido':''}</div>
      <div class="generated">Gerado em ${today}</div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot"></div>
    <span>${expired?'Plano vencido — solicite uma atualização ao treinador':'Plano ativo'}</span>
  </div>

  ${exercisesHTML}

  <div class="footer">
    <div class="footer-left">Sistema de Treinamento · Ficha gerada automaticamente</div>
    <div class="footer-right">${today}</div>
  </div>

</div>
<scr'+'ipt>window.onload=function(){window.print();}<\/script>
</body>
</html>`;

  const win=window.open('','_blank');
  if(win){ win.document.write(html); win.document.close(); toast('📄 PDF pronto para imprimir!'); }
  else { toast('Permita pop-ups para exportar PDF.','error'); }
};

// WhatsApp plan share
window.sharePlanWhatsApp=function(planId, studentName, studentPhone){
  const p=window.__gestorPlans&&window.__gestorPlans[planId];
  if(!p){toast('Plano não encontrado.','error');return;}
  const DAYS2=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  let msg=`🏋️ *FORGE — Ficha de Treino*\n👤 *${studentName}*\n📋 *${p.title}*\n`;
  if(p.expiry) msg+=`📅 Válido até ${new Date(p.expiry+'T12:00').toLocaleDateString('pt-BR')}\n`;
  msg+=`\n`;
  (p.workouts||[]).forEach((w,wi)=>{
    msg+=`*${String.fromCharCode(65+wi)}. ${w.title||'Treino '+(wi+1)}*\n`;
    if(w.days&&w.days.length) msg+=`📆 ${w.days.map(d=>DAYS2[d]).join(', ')}\n`;
    (w.exercises||[]).forEach((ex,ei)=>{
      msg+=`  ${ei+1}. ${ex.name} — ${ex.series}x${ex.reps}`;
      if(ex.unilateral) msg+=` (Unilateral)`;
      if(ex.biset) msg+=` + ${ex.biset}`;
      msg+=`\n`;
      if(ex.obs) msg+=`     _${ex.obs}_\n`;
    });
    msg+=`\n`;
  });
  msg+=`_Enviado via FORGE_ ⚡`;
  const encoded=encodeURIComponent(msg);
  let url='https://wa.me/';
  if(studentPhone){
    const cleaned=studentPhone.replace(/\D/g,'');
    let num=cleaned;
    if(!num.startsWith('55')) num='55'+num;
    url+=num;
  }
  url+=`?text=${encoded}`;
  window.open(url,'_blank');
  toast('Abrindo WhatsApp...');
};

window.deleteStudent=async id=>{
  if(!confirm('Excluir aluno e todos os planos?'))return;
  const snap=await _getDocs(_query(_col(_db,'plans'),_where('studentId','==',id)));
  for(const d of snap.docs) await _deleteDoc(_doc(_db,'plans',d.id));
  await _deleteDoc(_doc(_db,'students',id));
  toast('Aluno excluído.');
  await loadStudents();
  showStudentsList();
};
window.deletePlan=async(pid,sid)=>{
  if(!confirm('Excluir este plano?'))return;
  await _deleteDoc(_doc(_db,'plans',pid));
  toast('Plano excluído.');
  await openStudentDetail(sid);
};

  const student=ST.students.find(s=>s.id===sid)||{};
  const expired=isExpired(p);
  document.getElementById('pv-title').textContent=p.title;
  document.getElementById('pv-body').innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;padding:13px 16px;border-radius:var(--r);background:${expired?'var(--red-dim)':'var(--green-dim)'};border:1px solid ${expired?'rgba(229,62,62,.2)':'rgba(56,161,105,.2)'};font-size:.82rem;font-weight:600;color:${expired?'var(--red)':'var(--green)'};">

        <div class="pv-days">${(w.days||[]).map(d=>`<span class="day-chip">${DAYS[d]}</span>`).join('')}</div>
        ${(w.exercises||[]).map((ex,ei)=>`
          <div class="pv-ex">
            <div class="pv-ex-name">${ei+1}. ${ex.name}</div>
            <div class="pv-ex-meta">${ex.series} série(s) × ${ex.repsArr&&ex.repsArr.length>1?ex.repsArr.join(', '):ex.reps} rep${ex.unilateral?' · Unilateral':''}${ex.biset?' · Bi-set':''}${ex.obs?`<div style='margin-top:6px;padding:7px 10px;background:var(--surface2);border-radius:7px;border-left:3px solid var(--accent-soft);font-size:.78rem;color:var(--text2);font-style:italic;'>${ex.obs}</div>`:''}</div>

window.openPlanModal=async(sid,editId=null)=>{

window.renderWorkoutsEditor=()=>{
  document.getElementById('workouts-editor').innerHTML=ST.workoutBlocks.map((wb,bi)=>{
    const daysHTML=DAYS.map((d,di)=>`<button type="button" class="day-toggle ${(wb.days||[]).includes(di)?'selected':''}" onclick="toggleBlockDay(${bi},${di},this)">${d}</button>`).join('');
    const exHTML=wb.exercises.map((ex,ei)=>{
      const opts=Object.entries(EX_LIB).map(([cat,list])=>`<optgroup label="${cat}">${list.map(e=>`<option value="${e}" ${ex.name===e?'selected':''}>${e}</option>`).join('')}</optgroup>`).join('');
      // biset: full EX_LIB list so any exercise can be paired
      const bisets=Object.entries(EX_LIB).map(([cat,list])=>
        `<optgroup label="${cat}">${list.map(e=>`<option value="${e}" ${ex.biset===e?'selected':''}>${e}</option>`).join('')}</optgroup>`
      ).join('');
      // series reps: if series > 1, show individual reps fields
      const seriesCount=Number(ex.series)||1;

          </div>
          <div class="ex-num">${ei+1}</div>
          <select class="form-control" style="flex:1;" onchange="updateExInBlock(${bi},${ei},'name',this.value);renderWorkoutsEditor()"><option value="">— exercício —</option>${opts}</select>

        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
          <div>
            <span class="ctrl-label">Número de séries</span>
            <input type="number" class="form-control" min="1" max="20" value="${seriesCount}" oninput="updateSeriesCount(${bi},${ei},this.value)"/>
          </div>
          <div>
            <span class="ctrl-label">Bi-set com</span>
            <select class="form-control" onchange="updateExInBlock(${bi},${ei},'biset',this.value)">
              <option value="">Nenhum</option>${bisets}
            </select>
          </div>
        </div>
        <div style="margin-bottom:8px;">
          <span class="ctrl-label">Repetições por série</span>
          ${repsFields}
        </div>
        <div style="margin-bottom:8px;"><span class="ctrl-label">URL YouTube</span><input type="url" class="form-control" placeholder="https://youtube.com/watch?v=..." value="${ex.videoUrl||''}" onchange="updateExInBlock(${bi},${ei},'videoUrl',this.value)"/></div>
        <label class="checkbox-label"><input type="checkbox" ${ex.unilateral?'checked':''} onchange="updateExInBlock(${bi},${ei},'unilateral',this.checked)"/> Unilateral</label>
        <div style="margin-top:8px;"><span class="ctrl-label">Observações / Técnicas</span><textarea class="form-control" rows="2" placeholder="Ex: Cadência 2-0-2, descanso 60s, drop-set na última série..." style="resize:vertical;min-height:56px;" oninput="updateExInBlock(${bi},${ei},'obs',this.value)">${ex.obs||''}</textarea></div>
      </div>`;
    }).join('');
    return `<div class="workout-block">
      <div class="workout-block-header">
        <div class="wb-letter">${String.fromCharCode(65+bi)}</div>
        <input class="wb-title-input" type="text" value="${wb.title||''}" placeholder="Nome do treino..." onchange="updateBlockTitle(${bi},this.value)"/>
        ${ST.workoutBlocks.length>1?`<button type="button" class="remove-block-btn" onclick="removeWorkoutBlock(${bi})">✕</button>`:''}
      </div>
      <div class="workout-block-body">
        <div style="margin-bottom:8px;"><span class="ctrl-label">Dias da semana</span><div class="days-selector">${daysHTML}</div></div>
        <div><span class="ctrl-label">Exercícios</span><div class="exercises-list">${exHTML}</div><button type="button" class="add-ex-btn" onclick="addExToBlock(${bi})">+ exercício</button></div>
      </div>
    </div>`;
  }).join('');
  // Activate drag-and-drop after render
  setTimeout(initDragDrop, 0);
};

// ── Drag-and-drop reordering ──
window.initDragDrop=function(){
  // Only allow drag when initiated from the handle
  let _dragAllowed = false;

  document.querySelectorAll('.exercise-item').forEach(item=>{
    const handle = item.querySelector('.drag-handle');

    // Enable drag only on handle mousedown/touchstart
    if(handle){
      handle.addEventListener('mousedown', ()=>{ _dragAllowed=true; item.draggable=true; });
      handle.addEventListener('touchstart', ()=>{ _dragAllowed=true; item.draggable=true; }, {passive:true});
    }

    // Disable drag on mouseup anywhere (covers click-to-select text in inputs)
    item.addEventListener('mouseup', ()=>{ _dragAllowed=false; item.draggable=false; });
    item.addEventListener('mouseleave', ()=>{ if(!_dragAllowed){ item.draggable=false; } });

    // Prevent drag starting from inputs, selects, textareas
    item.addEventListener('dragstart', e=>{
      const tag = (e.target.tagName||'').toLowerCase();
      if(!_dragAllowed || ['input','select','textarea','label'].includes(tag)){
        e.preventDefault();
        item.draggable=false;
        return;
      }
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain', JSON.stringify({
        bi: +item.dataset.bi,
        ei: +item.dataset.ei
      }));
      item.classList.add('dragging');
    });
    item.addEventListener('dragend', ()=>{
      _dragAllowed=false;
      item.draggable=false;
      item.classList.remove('dragging');
      document.querySelectorAll('.exercise-item').forEach(i=>i.classList.remove('drag-over'));
    });
    item.addEventListener('dragover', e=>{
      e.preventDefault();
      e.dataTransfer.dropEffect='move';
      document.querySelectorAll('.exercise-item').forEach(i=>i.classList.remove('drag-over'));
      item.classList.add('drag-over');
    });
    item.addEventListener('dragleave', ()=>{
      item.classList.remove('drag-over');
    });
    item.addEventListener('drop', e=>{
      e.preventDefault();
      item.classList.remove('drag-over');
      try{
        const {bi: fromBi, ei: fromEi} = JSON.parse(e.dataTransfer.getData('text/plain'));
        const toBi = +item.dataset.bi;
        const toEi = +item.dataset.ei;
        if(fromBi !== toBi || fromEi === toEi) return;
        const exs = ST.workoutBlocks[fromBi].exercises;
        const [moved] = exs.splice(fromEi, 1);
        exs.splice(toEi, 0, moved);
        renderWorkoutsEditor();
      }catch(err){}
    });
  });
};

// Update series count → rebuild repsArr and re-render
window.updateSeriesCount=(bi,ei,val)=>{
  const n=Math.max(1,Math.min(20,parseInt(val)||1));
  const ex=ST.workoutBlocks[bi].exercises[ei];
  ex.series=n;
  let arr=Array.isArray(ex.repsArr)?[...ex.repsArr]:[(ex.reps||'12')];
  while(arr.length<n) arr.push(arr[arr.length-1]||'12');
  arr=arr.slice(0,n);
  ex.repsArr=arr;
  // Update display reps string
  ex.reps=arr.join(', ');
  renderWorkoutsEditor();
};

window.updateRepsSerie=(bi,ei,si,val)=>{
  const ex=ST.workoutBlocks[bi].exercises[ei];
  if(!Array.isArray(ex.repsArr)) ex.repsArr=[(ex.reps||'12')];
  ex.repsArr[si]=val;
  ex.reps=ex.repsArr.join(', ');
};

window.savePlan=async()=>{
  const title=document.getElementById('plan-title').value.trim();
  document.getElementById('plan-error').textContent='';
  if(!title){document.getElementById('plan-error').textContent='Nome do plano obrigatório.';return;}
  if(!ST.workoutBlocks.length){document.getElementById('plan-error').textContent='Adicione ao menos um treino.';return;}
  for(const wb of ST.workoutBlocks){if(!wb.exercises.filter(e=>e.name).length){document.getElementById('plan-error').textContent=`"${wb.title}" precisa de ao menos um exercício.`;return;}}
  const btn=document.getElementById('btn-save-plan');btn.classList.add('btn-loading');btn.textContent='Salvando...';
  const workouts=ST.workoutBlocks.map(wb=>({title:wb.title,days:wb.days||[],exercises:wb.exercises.filter(e=>e.name).map(e=>({name:e.name,series:Number(e.series)||1,reps:e.reps||'12',repsArr:e.repsArr||[e.reps||'12'],videoUrl:e.videoUrl||'',unilateral:!!e.unilateral,biset:e.biset||'',bisetName:e.biset||'',obs:e.obs||''}))}));
  const data={title,expiry:document.getElementById('plan-expiry').value||'',workouts,studentId:ST.planStudentId,createdAt:Date.now()};
  try{
    if(ST.editPlanId){await _updateDoc(_doc(_db,'plans',ST.editPlanId),data);toast('✅ Plano atualizado.');}
    else{await _setDoc(_doc(_db,'plans','plan_'+Date.now()),data);toast('✅ Plano criado!');}
    closeModal('modal-plan');await openStudentDetail(ST.planStudentId);
  }catch(e){document.getElementById('plan-error').textContent='Erro: '+e.message;toast('Erro ao salvar.','error');}
  finally{btn.classList.remove('btn-loading');btn.textContent='Salvar plano';}
};

// ── Auto login from localStorage ──
(function init(){
  if(hasSession()){ window.showDashboard(); }
})();
