<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="referrer" content="strict-origin-when-cross-origin"/>
  <title>Trainly — Aluno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f7f5;
      --bg2: #ffffff;
      --surface: #ffffff;
      --surface2: #f0f0ed;
      --surface3: #e8e8e4;
      --border: #e4e4e0;
      --border2: #d0d0cb;
      --accent: #f5c800;
      --accent2: #e0b400;
      --accent-dim: rgba(245,200,0,.10);
      --accent-soft: rgba(245,200,0,.25);
      --red: #e03e3e; --red-dim: rgba(224,62,62,.08);
      --green: #2e7d52; --green-dim: rgba(46,125,82,.08); --green-soft: rgba(46,125,82,.15);
      --text: #111110;
      --text2: #555550;
      --text3: #999990;
      --head: 'Nunito', sans-serif;
      --body: 'Plus Jakarta Sans', sans-serif;
      --r: 12px; --r2: 16px;
      --shadow: 0 2px 12px rgba(0,0,0,.07), 0 1px 3px rgba(0,0,0,.05);
      --shadow-md: 0 8px 32px rgba(0,0,0,.12), 0 2px 8px rgba(0,0,0,.07);
    }
    html { scroll-behavior: smooth; }
    /* Prevent zoom and horizontal scroll */
    html { touch-action: pan-x pan-y; overflow-x: hidden; }
    * { touch-action: manipulation; }
    body { overflow-x: hidden; }

    body { font-family: var(--body); background: var(--bg); color: var(--text); min-height: 100vh; }
    button { cursor: pointer; border: none; font-family: inherit; }
    input { font-family: inherit; }
    .hidden { display: none !important; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 5px; }

    #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: var(--surface); color: var(--text); padding: 13px 18px; border-radius: var(--r); font-size: .82rem; border: 1px solid var(--border); min-width: 240px; position: relative; animation: toastIn .25s cubic-bezier(.22,1,.36,1); box-shadow: var(--shadow-md); }
    .toast.success::before { content: ''; position: absolute; left: 0; top: 0; width: 3px; height: 100%; background: var(--green); border-radius: 3px 0 0 3px; }
    .toast.error::before { content: ''; position: absolute; left: 0; top: 0; width: 3px; height: 100%; background: var(--red); border-radius: 3px 0 0 3px; }
    @keyframes toastIn { from { transform: translateX(24px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* LOGIN */
    #screen-login { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; background: linear-gradient(135deg, #f7f7f5 0%, #fffef0 50%, #f7f7f5 100%); }
    .login-card { width: 100%; max-width: 340px; background: #ffffff; border: 1px solid #e4e4e0; border-radius: 24px; padding: 36px 32px; box-shadow: 0 8px 40px rgba(0,0,0,.1); }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: .75rem; font-weight: 700; color: #555550; margin-bottom: 7px; text-transform: uppercase; letter-spacing: .08em; }
    .form-control { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: var(--r); font-size: .9rem; background: var(--bg); color: var(--text); transition: all .15s; }
    .form-control:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(245,200,0,.15); }
    .btn-primary { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 20px; border-radius: var(--r); font-size: .9rem; font-weight: 800; background: var(--accent); color: #111110; cursor: pointer; border: none; transition: all .15s; box-shadow: 0 4px 20px rgba(245,200,0,.35); letter-spacing: .01em; }
    .btn-primary:hover { transform: translateY(-1px); background: #ffd700; box-shadow: 0 8px 28px rgba(245,200,0,.45); }
    .btn-primary:disabled { opacity: .4; pointer-events: none; }

    /* APP */
    #screen-app { display: none; flex-direction: column; min-height: 100vh; }
    .topbar { background: #111110; border-bottom: 1px solid #2e2e2a; padding: 0 20px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 16px rgba(0,0,0,.3); }
    .topbar-brand { font-family: var(--head); font-size: 1.1rem; font-weight: 800; color: #ffffff; display: flex; align-items: center; gap: 10px; letter-spacing: -.01em; }
    .topbar-brand .brand-dot { width: 8px; height: 8px; border-radius: 50%; background: #ffffff; }
    .student-pill { background: rgba(245,200,0,.12); border: 1px solid rgba(245,200,0,.3); border-radius: 8px; padding: 5px 12px; font-size: .78rem; font-weight: 700; color: var(--accent); }
    .logout-btn { background: none; color: #555550; font-size: .78rem; padding: 6px 12px; border-radius: 8px; transition: all .15s; font-weight: 600; }
    .logout-btn:hover { color: var(--red); background: var(--red-dim); }

    /* GREETING */
    .greeting-wrap { padding: 20px 20px 4px; }
    .greeting { font-family: var(--head); font-size: 1.5rem; font-weight: 800; color: var(--text); }
    .greeting span { color: var(--text); }

    /* STATUS BANNER */
    .plan-status-bar { margin: 12px 20px 0; border-radius: var(--r); padding: 13px 16px; display: flex; align-items: center; gap: 10px; font-size: .82rem; font-weight: 600; border: 1px solid; }
    .plan-status-bar.active { background: rgba(46,125,82,.07); border-color: rgba(46,125,82,.2); color: var(--green); }
    .plan-status-bar.expired { background: var(--red-dim); border-color: rgba(224,62,62,.2); color: var(--red); }
    .plan-status-bar.none { background: var(--surface2); border-color: var(--border); color: var(--text2); }
    .psb-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .psb-text { flex: 1; }
    .psb-name { font-weight: 700; margin-left: 4px; }

    /* TODAY CARD */
    .today-card { margin: 12px 20px 0; background: #ffffff; border: 1px solid var(--border); border-radius: var(--r2); padding: 18px 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 12px rgba(0,0,0,.07); position: relative; overflow: hidden; }
    .today-card::before { content: ''; position: absolute; top: -40px; right: -40px; width: 140px; height: 140px; border-radius: 50%; background: rgba(245,200,0,.12); pointer-events: none; }
    .today-card::after { content: ''; position: absolute; bottom: -20px; right: 80px; width: 80px; height: 80px; border-radius: 50%; background: rgba(245,200,0,.04); pointer-events: none; }
    .today-card-label { font-size: .68rem; font-weight: 800; color: #b8940a; text-transform: uppercase; letter-spacing: .12em; margin-bottom: 6px; }
    .today-card-workout { font-family: var(--head); font-size: 1.2rem; font-weight: 800; color: #111110; line-height: 1.2; }
    .today-card-day { font-size: .78rem; color: #888880; font-weight: 600; margin-top: 5px; opacity: 1; }
    .today-card-icon { font-size: 2.4rem; flex-shrink: 0; filter: drop-shadow(0 2px 8px rgba(0,0,0,.4)); position: relative; z-index: 1; }

    /* CONTENT */
    .content { padding: 16px 20px 40px; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: 60px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 80px 20px; color: var(--text3); }
    .empty-state .ei { font-size: 3rem; margin-bottom: 14px; display: block; }
    .empty-state p { font-size: .88rem; font-weight: 500; }

    /* PLAN */
    .plan-wrap { margin-bottom: 28px; }
    .plan-header-strip { display: flex; align-items: center; gap: 10px; padding: 0 4px; margin-bottom: 12px; }
    .plan-header-name { font-family: var(--head); font-size: 1.05rem; font-weight: 800; color: var(--text); }
    .plan-header-expiry { font-size: .75rem; color: var(--text3); margin-left: auto; font-weight: 500; }
    .plan-expired-badge { background: var(--red-dim); color: var(--red); border: 1px solid rgba(224,62,62,.2); border-radius: 99px; padding: 3px 10px; font-size: .72rem; font-weight: 700; }

    /* PROGRESS */
    .progress-wrap { margin-bottom: 14px; }
    .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; font-size: .78rem; font-weight: 700; color: var(--text2); }
    .progress-bar-bg { height: 8px; background: var(--surface2); border-radius: 99px; overflow: hidden; border: 1px solid var(--border); }
    .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width .4s cubic-bezier(.22,1,.36,1); box-shadow: 0 0 8px rgba(245,200,0,.4); }
    .completed-banner { background: rgba(245,200,0,.08); border: 1.5px solid rgba(245,200,0,.3); border-radius: var(--r); padding: 14px 18px; display: none; align-items: center; gap: 12px; font-weight: 700; font-size: .95rem; color: #b8940a; margin-top: 10px; animation: popIn .4s cubic-bezier(.22,1,.36,1); }
    @keyframes popIn { from { transform: scale(.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    /* WORKOUT ACCORDION */
    .workout-accordion {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 14px;
      transition: all .25s;
      box-shadow: 0 2px 10px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.04);
    }
    .workout-accordion:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,.1), 0 2px 8px rgba(0,0,0,.06); }
    .workout-accordion.is-today {
      border-color: var(--border);
      box-shadow: 0 4px 20px rgba(0,0,0,.1), 0 2px 6px rgba(0,0,0,.05);
    }
    .workout-accordion-header {
      display: flex; align-items: center; gap: 14px;
      padding: 18px 20px;
      cursor: pointer; user-select: none;
      position: relative; overflow: hidden;
      background: #ffffff;
    }
    .workout-accordion.is-today .workout-accordion-header {
      background: #ffffff;
    }
    .workout-accordion-header::before {
      content: ''; position: absolute;
      right: -30px; top: -30px;
      width: 110px; height: 110px; border-radius: 50%;
      background: rgba(0,0,0,.025); pointer-events: none;
    }
    .workout-accordion.is-today .workout-accordion-header::before { background: rgba(245,200,0,.04); }
    .workout-accordion-header::after {
      content: ''; position: absolute;
      right: 40px; bottom: -40px;
      width: 80px; height: 80px; border-radius: 50%;
      background: rgba(0,0,0,.015); pointer-events: none;
    }
    .workout-accordion.is-today .workout-accordion-header::after { background: rgba(245,200,0,.03); }

    .wa-letter {
      width: 44px; height: 44px; border-radius: 14px; flex-shrink: 0;
      background: var(--surface2); border: 1.5px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--head); font-weight: 800; font-size: 1.1rem; color: var(--text2);
      transition: all .2s;
    }
    .workout-accordion.is-today .wa-letter {
      background: var(--accent);
      border-color: var(--accent2);
      color: #111110;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    .wa-info { flex: 1; position: relative; z-index: 1; }
    .wa-title { font-weight: 800; font-size: 1rem; color: var(--text); letter-spacing: -.01em; }
    .workout-accordion.is-today .wa-title { color: var(--text); }
    .wa-meta { font-size: .74rem; color: var(--text3); margin-top: 3px; font-weight: 500; display: flex; align-items: center; gap: 5px; }
    .workout-accordion.is-today .wa-meta { color: var(--text3); }
    .wa-meta-dot { width: 3px; height: 3px; border-radius: 50%; background: currentColor; opacity: .5; }
    .wa-today-badge {
      background: var(--accent); color: #111110;
      border: none; border-radius: 99px;
      padding: 4px 12px; font-size: .68rem; font-weight: 900;
      letter-spacing: .08em; text-transform: uppercase;
      position: relative; z-index: 1;
      box-shadow: 0 2px 10px rgba(245,200,0,.4);
    }
    .wa-arrow {
      width: 28px; height: 28px; border-radius: 8px;
      background: var(--surface2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--text3); font-size: .7rem;
      transition: all .25s; flex-shrink: 0; position: relative; z-index: 1;
    }
    .workout-accordion.is-today .wa-arrow { background: var(--surface2); border-color: var(--border); color: var(--text3); }
    .workout-accordion.open .wa-arrow { transform: rotate(90deg); }

    .workout-days-row {
      padding: 10px 20px 12px;
      display: flex; gap: 6px; flex-wrap: wrap;
      background: var(--surface2); border-top: 1px solid var(--border);
    }
    .day-chip { background: var(--surface); color: var(--text2); border: 1px solid var(--border2); border-radius: 99px; padding: 4px 12px; font-size: .71rem; font-weight: 700; }
    .day-chip.today { background: var(--accent); border-color: transparent; color: #111110; font-weight: 800; box-shadow: 0 2px 8px rgba(245,200,0,.35); }

    .exercises-body { padding: 10px 12px 14px; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid var(--border); background: var(--bg); }

    /* ── EXERCISE CARD ── */
    .exercise-row {
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      transition: box-shadow .2s;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      display: flex; flex-direction: row;
      align-items: stretch;
      border: 1px solid var(--border);
      min-height: 64px;
    }
    .exercise-row:hover { box-shadow: 0 3px 14px rgba(0,0,0,.1); }
    .exercise-row.checked { border-color: rgba(46,125,82,.3); background: #fafffe; }

    /* Left accent bar + number */
    .ex-side {
      width: 44px; flex-shrink: 0;
      background: var(--bg);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2px;
      transition: background .2s;
    }
    .exercise-row.checked .ex-side { background: rgba(46,125,82,.07); border-right-color: rgba(46,125,82,.2); }
    .ex-idx {
      font-family: var(--head); font-size: .72rem; font-weight: 800;
      color: var(--text3); transition: color .2s;
    }
    .exercise-row.checked .ex-idx { color: var(--green); }
    .ex-side-bar {
      width: 3px; height: 20px; border-radius: 99px;
      background: var(--border2); transition: background .2s; margin-top: 3px;
    }
    .exercise-row:hover .ex-side-bar { background: var(--accent); }
    .exercise-row.checked .ex-side-bar { background: var(--green); }

    /* Main content */
    .ex-main {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; padding: 10px 12px;
      min-width: 0;
    }
    .ex-name {
      font-weight: 700; font-size: .87rem;
      color: var(--text); line-height: 1.25;
      margin-bottom: 5px; transition: color .2s;
    }
    .exercise-row.checked .ex-name { color: var(--green); }

    /* Inline stats row */
    .ex-inline {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .ex-pill {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: .72rem; font-weight: 700;
      color: var(--text2); background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px; padding: 3px 8px;
      white-space: nowrap;
    }
    .ex-pill-accent { background: rgba(245,200,0,.12); border-color: rgba(245,200,0,.3); color: #8a6c00; }
    .ex-pill-sep { width: 3px; height: 3px; border-radius: 50%; background: var(--border2); flex-shrink: 0; }
    .exercise-row.checked .ex-pill { background: rgba(46,125,82,.06); border-color: rgba(46,125,82,.2); color: var(--green); }

    .ex-obs {
      margin-top: 6px; padding: 5px 8px;
      background: var(--bg); border-radius: 6px;
      border-left: 2px solid var(--border2);
      font-size: .72rem; color: var(--text3);
      font-style: italic; line-height: 1.45;
    }
    .exercise-row.checked .ex-obs { border-left-color: rgba(46,125,82,.35); }

    /* Right: check button */
    .ex-right {
      flex-shrink: 0; display: flex;
      align-items: center; justify-content: center;
      padding: 0 12px;
      border-left: 1px solid var(--border);
    }
    .exercise-row.checked .ex-right { border-left-color: rgba(46,125,82,.2); }
    .check-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1.5px solid var(--border2);
      background: transparent; color: var(--text3);
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem; transition: all .18s; cursor: pointer;
      flex-shrink: 0;
    }
    .check-btn:hover { border-color: var(--accent); background: var(--accent); color: #111110; transform: scale(1.08); }
    .exercise-row.checked .check-btn { border-color: var(--green); background: var(--green); color: white; box-shadow: 0 2px 8px rgba(46,125,82,.3); }

    /* Video stays below (full width inside main) */
    .ex-video-wrap { padding: 0 12px 10px; }
    .yt-link-btn { display: flex; align-items: center; gap: 0; background: #0f0f0f; border-radius: 8px; overflow: hidden; text-decoration: none; transition: opacity .18s; }
    .yt-link-btn:hover { opacity: .88; }
    .yt-thumb { width: 80px; height: 48px; object-fit: cover; flex-shrink: 0; }
    .yt-play-overlay { display: flex; align-items: center; gap: 7px; padding: 0 12px; color: white; font-size: .75rem; font-weight: 700; font-family: var(--body); }

    /* hidden old classes */
    .ex-stat-div, .ex-stat-biset, .ex-stat-bname, .ex-stats-wrap, .ex-stats, .ex-stat, .ex-tags, .ex-header { display: none; }

    @media (max-width: 600px) {
      .content { padding: 12px 14px 100px; }
      .plan-status-bar, .today-card { margin-left: 14px; margin-right: 14px; }
      .greeting-wrap { padding: 16px 14px 4px; }
      .login-card { padding: 32px 24px; }
    }
    @media (min-width: 601px) {
      .content { padding-bottom: 100px; }
    }
  </style>
</head>
<body>
<div id="toast-container"></div>

<!-- LOGIN -->
<div id="screen-login">
  <div class="login-card">
    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Código de acesso</label>
        <input id="login-code" class="form-control" type="text" placeholder="Ex: AB3X7K" maxlength="6" autocomplete="off" style="text-transform:uppercase;letter-spacing:.18em;font-size:1.2rem;text-align:center;font-weight:700;"/>
      </div>
      <div id="login-error" style="color:var(--red);font-size:.8rem;font-weight:600;min-height:20px;margin-bottom:12px;"></div>
      <button type="submit" id="btn-login" class="btn-primary" style="width:100%;padding:13px;">Acessar ficha →</button>
    </form>
  </div>
</div>

<!-- APP -->
<div id="screen-app">
  <div class="topbar">
    <div class="topbar-brand"><div class="brand-dot"></div>Trainly</div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="student-pill" id="student-pill">—</div>
      <button class="logout-btn" onclick="doLogout()">Sair</button>
    </div>
  </div>
  <div id="trainer-bar" class="hidden" style="background:#1a1a18;border-bottom:1px solid #2e2e2a;padding:7px 20px;display:flex;align-items:center;gap:8px;">
    <span style="font-size:.72rem;color:#999990;font-weight:600;text-transform:uppercase;letter-spacing:.1em;">Treinador</span>
    <span id="trainer-name" style="font-size:.82rem;font-weight:800;color:var(--accent);letter-spacing:.01em;">—</span>
  </div>
  <div class="greeting-wrap"><div class="greeting" id="greeting-text">Olá! 👋</div></div>
  <div id="plan-status-wrap"></div>
  <div id="today-wrap"></div>
  <div id="content" class="content"><div class="spinner"></div></div>

  <!-- WhatsApp trainer button — fixed bottom bar -->
  <div id="wa-trainer-bar" class="hidden" style="
    position:fixed; bottom:0; left:0; right:0; z-index:200;
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    background:linear-gradient(to top, var(--bg) 70%, transparent);
  ">
    <a id="wa-trainer-btn" href="#" target="_blank" style="
      display:flex; align-items:center; justify-content:center; gap:10px;
      background:#25d366; color:#fff; border-radius:14px;
      padding:14px 20px; text-decoration:none;
      font-family:var(--body); font-size:.92rem; font-weight:800;
      box-shadow:0 4px 20px rgba(37,211,102,.4);
      transition:opacity .15s;
    ">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
      Chamar Treinador no WhatsApp
    </a>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

const db = getFirestore(initializeApp({
  apiKey:"AIzaSyBVhMJfE1Zj9sVHztDXHUtsC_Y2WIikrkU",
  authDomain:"fichasacademia-8717d.firebaseapp.com",
  projectId:"fichasacademia-8717d",
  storageBucket:"fichasacademia-8717d.firebasestorage.app",
  messagingSenderId:"501312058117",
  appId:"1:501312058117:web:1b9ea06882050deeb33d6c"
}));

const DAYS_ABBR=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
const DAYS_FULL=["Domingo","Segunda-feira","Terça-feira","Quarta-feira","Quinta-feira","Sexta-feira","Sábado"];
const TODAY=new Date().getDay();

const toast=(msg,type='success')=>{const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;document.getElementById('toast-container').appendChild(t);setTimeout(()=>t.remove(),3500)};
const isExpired=p=>{if(!p.expiry)return false;return new Date(p.expiry)<new Date(new Date().toDateString())};

const LS_KEY='forge_student_session';
function saveSession(s){ try{ localStorage.setItem(LS_KEY,JSON.stringify(s)); }catch(e){} }
function loadSession(){ try{ const r=localStorage.getItem(LS_KEY); return r?JSON.parse(r):null; }catch(e){ return null; } }
function clearSession(){ try{ localStorage.removeItem(LS_KEY); }catch(e){} }

window.handleLogin=async e=>{
  e.preventDefault();
  const code=document.getElementById('login-code').value.trim().toUpperCase();
  const errEl=document.getElementById('login-error');
  const btn=document.getElementById('btn-login');
  if(!code){errEl.textContent='Código obrigatório.';return;}
  errEl.textContent='';btn.disabled=true;btn.textContent='Verificando...';
  try{
    const snap=await getDocs(query(collection(db,'students'),where('code','==',code)));
    if(snap.empty){errEl.textContent='Código não encontrado.';return;}
    const student={id:snap.docs[0].id,...snap.docs[0].data()};
    saveSession(student); showApp(student);
  }catch(err){errEl.textContent='Erro: '+err.message;}
  finally{btn.disabled=false;btn.textContent='Acessar ficha →';}
};

function showApp(student){
  _currentStudent=student;
  document.getElementById('screen-login').style.display='none';
  document.getElementById('screen-app').style.cssText='display:flex;flex-direction:column;';
  document.getElementById('student-pill').textContent=student.name;
  const first=student.name.trim().split(' ')[0];
  document.getElementById('greeting-text').innerHTML=`Olá, <span>${first}</span>! 👋`;
  // Show trainer name if available
  const trainerName = student.managerName || student.managerId || null;
  const trainerBar = document.getElementById('trainer-bar');
  if(trainerName && trainerBar){
    document.getElementById('trainer-name').textContent = trainerName;
    trainerBar.classList.remove('hidden');
    trainerBar.style.display='flex';
  }
  // Show WhatsApp button - always visible if any phone is available
  // Falls back to felipereis number for legacy students without managerPhone
  const trainerPhone = student.managerPhone || '27974008527';
  const waBar = document.getElementById('wa-trainer-bar');
  const waBtn = document.getElementById('wa-trainer-btn');
  if(waBar && waBtn){
    const cleaned = trainerPhone.replace(/\D/g,'');
    const num = cleaned.startsWith('55') ? cleaned : '55'+cleaned;
    waBtn.href = `https://wa.me/${num}`;
    waBar.classList.remove('hidden');
    waBar.style.display='block';
  }
  loadPlans(student);
}

window.doLogout=()=>{
  clearSession();
  _currentStudent=null;
  document.getElementById('screen-app').style.display='none';
  document.getElementById('screen-login').style.display='flex';
  document.getElementById('login-code').value='';
  document.getElementById('content').innerHTML='<div class="spinner"></div>';
  document.getElementById('plan-status-wrap').innerHTML='';
  document.getElementById('today-wrap').innerHTML='';
  document.getElementById('greeting-text').innerHTML='Olá! 👋';
  const tb=document.getElementById('trainer-bar');
  if(tb){ tb.classList.add('hidden'); tb.style.display='none'; }
  const wb=document.getElementById('wa-trainer-bar');
  if(wb){ wb.classList.add('hidden'); wb.style.display='none'; }
};

async function loadPlans(student){
  const content=document.getElementById('content');
  content.innerHTML='<div class="spinner"></div>';
  try{
    const snap=await getDocs(query(collection(db,'plans'),where('studentId','==',student.id)));
    const plans=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>b.createdAt-a.createdAt);
    const activePlans=plans.filter(p=>!isExpired(p));
    const latestActive=activePlans[0]||null;
    const latestExpired=!latestActive&&plans.filter(p=>isExpired(p)).sort((a,b)=>new Date(b.expiry)-new Date(a.expiry))[0]||null;

    const statusWrap=document.getElementById('plan-status-wrap');
    if(latestActive){
      const d=latestActive.expiry?new Date(latestActive.expiry+'T12:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'}):'sem data de validade';
      statusWrap.innerHTML=`<div class="plan-status-bar active"><div class="psb-dot"></div><div class="psb-text">✅ Plano ativo<span class="psb-name">${latestActive.title}</span>${latestActive.expiry?` · válido até ${d}`:' · sem validade'}</div></div>`;
    }else if(latestExpired){
      const d=new Date(latestExpired.expiry+'T12:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
      statusWrap.innerHTML=`<div class="plan-status-bar expired"><div class="psb-dot"></div><div class="psb-text">Plano vencido em ${d} — solicite uma atualização ao seu treinador</div></div>`;
    }else if(plans.length===0){
      statusWrap.innerHTML=`<div class="plan-status-bar none"><div class="psb-dot"></div><div class="psb-text">Nenhum plano de treino cadastrado</div></div>`;
    }

    const todayWrap=document.getElementById('today-wrap');
    const todayWorkouts=[];
    for(const p of activePlans){ for(const w of (p.workouts||[])){ if((w.days||[]).includes(TODAY)) todayWorkouts.push(w.title); } }
    if(todayWorkouts.length){
      todayWrap.innerHTML=`<div class="today-card"><div class="today-card-left"><div class="today-card-label">💪 Treino de hoje</div><div class="today-card-workout">${todayWorkouts.join(' · ')}</div><div class="today-card-day">${DAYS_FULL[TODAY]}</div></div><div class="today-card-icon">🏋️</div></div>`;
    }

    if(!plans.length){
      content.innerHTML=`<div class="empty-state"><span class="ei">🏋️</span><p>Nenhum plano de treino cadastrado ainda.</p></div>`;
      return;
    }

    content.innerHTML='';
    for(const p of [...activePlans,...plans.filter(p=>isExpired(p))]){
      content.appendChild(renderPlan(p));
    }
  }catch(err){
    content.innerHTML=`<div class="empty-state"><p>Erro ao carregar: ${err.message}</p></div>`;
  }
}

// ── Check state (in-memory per session) ──
const checkState={};
let _currentStudent=null; // set when showApp is called

window.toggleCheck=async function(planId,wi,ei,total,progressId,planTitle,workoutTitle,studentName){
  const key=`${planId}_${wi}_${ei}`;
  checkState[key]=!checkState[key];
  const row=document.getElementById(`exrow_${planId}_${wi}_${ei}`);
  const btn=document.getElementById(`chkbtn_${planId}_${wi}_${ei}`);
  if(checkState[key]){
    row.classList.add('checked');
    btn.innerHTML='✓';
    btn.title='Concluído';
  }else{
    row.classList.remove('checked');
    btn.innerHTML='✓';
    btn.title='Marcar como feito';
  }
  // update progress
  let done=0;
  for(let i=0;i<total;i++){ if(checkState[`${planId}_${wi}_${i}`]) done++; }
  const pct=total>0?Math.round((done/total)*100):0;
  const pw=document.getElementById(progressId);
  if(pw){
    pw.querySelector('.progress-bar-fill').style.width=pct+'%';
    pw.querySelector('.progress-label').textContent=`${done}/${total} exercícios`;
    const banner=pw.querySelector('.completed-banner');
    const notifKey=`notif_${planId}_${wi}`;
    if(pct===100){
      banner.style.display='flex';
      toast('🏆 Treino concluído! Ótimo trabalho!');
      // Fire notification to gestor (only once per session per workout)
      if(!checkState[notifKey]){
        checkState[notifKey]=true;
        try{
          const today=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
          await addDoc(collection(db,'notifications'),{
            type:'workout_done',
            studentName: studentName||(_currentStudent&&_currentStudent.name)||'Aluno',
            planTitle: planTitle||'',
            workoutTitle: workoutTitle||'',
            date: today,
            timestamp: Date.now(),
            read: false
          });
        }catch(e){ console.warn('Notification write failed:',e.message); }
      }
    }else{
      banner.style.display='none';
    }
  }
};

window.handleCheckBtn=function(btn){
  const d=btn.dataset;
  toggleCheck(d.plan,+d.wi,+d.ei,+d.total,d.prog,d.ptitle,d.wtitle,d.sname);
};

function renderPlan(p){
  const expired=isExpired(p);
  const wrap=document.createElement('div');
  wrap.className='plan-wrap';
  const expiryText=p.expiry?`Válido até ${new Date(p.expiry+'T12:00').toLocaleDateString('pt-BR')}`:'Sem validade';

  wrap.innerHTML=`
    <div class="plan-header-strip">
      <div class="plan-header-name">${p.title}</div>
      ${expired?`<span class="plan-expired-badge">Vencido</span>`:''}
      <div class="plan-header-expiry">${expiryText}</div>
    </div>`;

  (p.workouts||[]).forEach((w,wi)=>{
    const isToday=!expired&&(w.days||[]).includes(TODAY);
    const exs=w.exercises||[];
    const total=exs.length;
    const progressId=`prog_${p.id}_${wi}`;

    const acc=document.createElement('div');
    acc.className=`workout-accordion${isToday?' is-today':''}`;

    const exsHTML=exs.map((ex,ei)=>{
      // compute reps display
      const repsArr=Array.isArray(ex.repsArr)?ex.repsArr:(ex.reps?ex.reps.split(',').map(s=>s.trim()):[ex.reps||'']);
      const uniqueReps=[...new Set(repsArr)];
      const repsDisplay=uniqueReps.length===1?uniqueReps[0]:repsArr.join(', ');
      const namePart=ex.name+(ex.biset?` <span style="color:var(--text3);font-weight:500;"> + </span><span style="font-weight:700;">${ex.bisetName||ex.biset}</span>`:'');
      const videoHtml=ex.videoUrl&&ytId(ex.videoUrl)?`<div class="ex-video-wrap">${renderVideo(ex.videoUrl)}</div>`:'';
      return `
      <div class="exercise-row" id="exrow_${p.id}_${wi}_${ei}">
        <div class="ex-side">
          <div class="ex-idx">${ei+1}</div>
          <div class="ex-side-bar"></div>
        </div>
        <div class="ex-main">
          <div class="ex-name">${namePart}</div>
          <div class="ex-inline">
            <span class="ex-pill">${ex.series} séries</span>
            <span class="ex-pill-sep"></span>
            <span class="ex-pill">${repsDisplay} rep</span>
            ${ex.unilateral?'<span class="ex-pill-sep"></span><span class="ex-pill ex-pill-accent">Unilateral</span>':''}
            ${ex.biset?'<span class="ex-pill-sep"></span><span class="ex-pill ex-pill-accent">Bi-set</span>':''}
          </div>
          ${ex.obs?'<div class="ex-obs">'+ex.obs+'</div>':''}
          ${videoHtml}
        </div>
        <div class="ex-right">
          <button class="check-btn" id="chkbtn_${p.id}_${wi}_${ei}"
            data-plan="${p.id}" data-wi="${wi}" data-ei="${ei}" data-total="${total}"
            data-prog="${progressId}"
            data-ptitle="${(p.title||'').replace(/"/g,'&quot;')}"
            data-wtitle="${(w.title||'Treino '+(wi+1)).replace(/"/g,'&quot;')}"
            data-sname="${((_currentStudent&&_currentStudent.name)||'Aluno').replace(/"/g,'&quot;')}"
            onclick="handleCheckBtn(this)">✓</button>
        </div>
      </div>`;
    }).join('');

    acc.innerHTML=`
      <div class="workout-accordion-header" onclick="toggleAccordion(this)">
        <div class="wa-letter">${String.fromCharCode(65+wi)}</div>
        <div class="wa-info">
          <div class="wa-title">${w.title||'Treino '+(wi+1)}</div>
          <div class="wa-meta">${total} exercício${total!==1?'s':''}<span class="wa-meta-dot"></span>${(w.days||[]).map(d=>DAYS_ABBR[d]).join(', ')||'sem dias'}</div>
        </div>
        ${isToday?'<span class="wa-today-badge">HOJE</span>':''}
        <div class="wa-arrow">▶</div>
      </div>
      <div class="workout-days-row" style="display:none;">
        ${(w.days||[]).map(d=>`<span class="day-chip ${d===TODAY&&!expired?'today':''}">${DAYS_ABBR[d]}</span>`).join('')}
      </div>
      <div class="exercises-body" style="display:none;">
        <div class="progress-wrap" id="${progressId}">
          <div class="progress-header">
            <span>Progresso</span>
            <span class="progress-label">0/${total} exercícios</span>
          </div>
          <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:0%"></div></div>
          <div class="completed-banner">🏆 Treino concluído! Ótimo trabalho!</div>
        </div>
        ${exsHTML}
      </div>`;

    wrap.appendChild(acc);
  });

  return wrap;
}

window.toggleAccordion=header=>{
  const acc=header.closest('.workout-accordion');
  const open=acc.classList.contains('open');
  const daysRow=acc.querySelector('.workout-days-row');
  const body=acc.querySelector('.exercises-body');
  if(open){acc.classList.remove('open');daysRow.style.display='none';body.style.display='none';}
  else{acc.classList.add('open');daysRow.style.display='flex';body.style.display='flex';}
};

(async function init(){
  const saved=loadSession();
  if(saved){ showApp(saved); }
})();
</script>
<script>
window.ytId=function(url){
  if(!url) return '';
  var m=url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
  return m?m[1]:'';
};
window.ytLink=function(url){
  var id=window.ytId(url);
  return id?'https://www.youtube.com/watch?v='+id:'';
};
window.ytThumb=function(url){
  var id=window.ytId(url);
  return id?'https://img.youtube.com/vi/'+id+'/hqdefault.jpg':'';
};
window.renderVideo=function(url){
  var id=window.ytId(url);
  if(!id) return '';
  return '<a href="'+window.ytLink(url)+'" target="_blank" class="yt-link-btn">'
    +'<img src="'+window.ytThumb(url)+'" class="yt-thumb" alt="Ver exercício"/>'
    +'<div class="yt-play-overlay">'
    +'<svg width="36" height="36" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>'
    +'<span>Ver no YouTube</span>'
    +'</div>'
    +'</a>';
};
</script>
